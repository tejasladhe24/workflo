[project]
name = "example-nodes"
version = "0.1.0"
description = "Example community workflow nodes for Starboard"
requires-python = ">=3.11"
dependencies = []

[project.entry-points."starboard.nodes"]
uppercase = "example_nodes.handlers:handle_uppercase"
concat = "example_nodes.handlers:handle_concat"
constant = "example_nodes.handlers:handle_constant"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["example_nodes"]
