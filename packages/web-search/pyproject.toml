[project]
name = "web-search"
version = "0.1.0"
description = "Helps with web search"
requires-python = ">=3.11"
dependencies = [
    "google-search-results>=2.4.2",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.3.0",
    "langgraph>=0.2.0",
]

[project.entry-points."workflo.nodes"]
web_search = "web_search.handlers:handle_web_search"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["web_search"]
