[project]
name = "story-writer"
version = "0.1.0"
description = "LLM story writer workflow node"
requires-python = ">=3.11"
dependencies = [
    "langchain-core>=0.3.0",
    "langchain-openai>=0.3.0",
]

[project.entry-points."workflo.nodes"]
story_writer = "story_writer.handlers:handle_story_writer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["story_writer"]
